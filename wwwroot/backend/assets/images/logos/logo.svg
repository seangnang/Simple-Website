<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Graduation cap icon -->
  <!-- Cap base (book shape) -->
  <rect x="2" y="22" width="36" height="22" rx="4" fill="url(#grad)"/>
  <!-- Diamond top -->
  <polygon points="20,4 40,16 20,22 0,16" fill="#4f46e5"/>
  <!-- Shine on diamond -->
  <polygon points="20,6 36,16 20,20 4,16" fill="#6366f1" opacity="0.5"/>
  <!-- Tassel string -->
  <line x1="40" y1="16" x2="40" y2="28" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="40" cy="30" r="3" fill="#fbbf24"/>
  <!-- Book pages lines -->
  <line x1="10" y1="30" x2="30" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="35" x2="30" y2="35" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="52" y="35" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="800" fill="#1e1b4b" letter-spacing="-1">
    learn
  </text>

  <!-- Dot accent -->
  <circle cx="168" cy="34" r="4" fill="url(#grad)"/>
</svg>
